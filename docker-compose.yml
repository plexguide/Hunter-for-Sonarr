version: "3.8"
services:
  huntarr-sonarr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huntarr-sonarr
    restart: always
    environment:
      API_KEY: "your-api-key"
      API_URL: "http://your-sonarr-address:8989"
      API_TIMEOUT: "60"
      MONITORED_ONLY: "true"
      HUNT_MISSING_SHOWS: "1"
      HUNT_UPGRADE_EPISODES: "0"
      SLEEP_DURATION: "1500"
      RANDOM_SELECTION: "true"
      STATE_RESET_INTERVAL_HOURS: "168"
      DEBUG_MODE: "false"
      TZ: "America/New_York"
    volumes:
      # Optional: Mount source code for hot-reloading during development
      # - ./:/app
      # Mount state directory to persist state between container restarts
      - huntarr-state:/tmp/huntarr-state

volumes:
  huntarr-state: