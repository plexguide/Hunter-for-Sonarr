version: '3'

services:
  huntarr-sonarr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huntarr-sonarr
    ports:
      - "9705:9705"
    volumes:
      - huntarr-sonarr-config:/config
      - /tmp/huntarr-logs:/tmp/huntarr-logs
      - /tmp/huntarr-state:/tmp/huntarr-state
    environment:
      - TZ=America/New_York
    restart: unless-stopped

volumes:
  huntarr-sonarr-config:
    name: huntarr-sonarr-config