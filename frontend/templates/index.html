<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huntarr-Sonarr</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><a href="https://github.com/plexguide/huntarr-sonarr" target="_blank" class="title-link">Huntarr <span class="edition">[Sonarr Edition II]</span></a></h1>
            <div class="buttons">
                <button id="logsButton" class="active">Logs</button>
            </div>
            <div class="theme-toggle">
                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider round"></span>
                </label>
                <span id="themeLabel">Light Mode</span>
            </div>
        </div>

        <div id="logsContainer" class="content-section">
            <div class="log-controls">
                <div class="connection-status">
                    Status: <span id="status" class="status-disconnected">Disconnected</span>
                </div>
                <div class="auto-scroll">
                    <label>
                        <input type="checkbox" id="autoScroll" checked>
                        Auto-scroll
                    </label>
                </div>
                <button id="clearLogs" class="clear-button">Clear Logs</button>
            </div>
            <div id="logs" class="logs"></div>
        </div>

        <div class="footer">
            <p>⭐ Tool Great? <a href="https://donate.plex.one" target="_blank">Donate @ donate.plex.one</a> for Daughter's College Fund! Also, please <a href="https://github.com/plexguide/huntarr-sonarr" target="_blank">star the project on GitHub</a> if you find it useful!</p>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
