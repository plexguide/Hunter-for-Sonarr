<section id="settingsSection" class="content-section">
    <div class="section-header">
        <div class="settings-header">
            <h2>Sonarr Settings</h2>
        </div>
        
        <div class="settings-actions">
            <button id="saveSettings" class="save-button">
                <i class="fas fa-save"></i> Save
            </button>
            <button id="resetSettings" class="reset-button">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>
    </div>
    
    <div class="settings-form">
        <!-- Sonarr settings panel -->
        <div id="sonarrSettings" class="app-settings-panel active" style="display: block;"></div>
    </div>
    
    <div class="bottom-actions">
        <button id="saveSettingsBottom" class="save-button">
            <i class="fas fa-save"></i> Save
        </button>
        <button id="resetSettingsBottom" class="reset-button">
            <i class="fas fa-undo"></i> Reset
        </button>
    </div>
</section>

<script>
    // Initialize settings when the page loads
    document.addEventListener('DOMContentLoaded', function() {
        console.log('Settings section initialized');
        
        // Load Sonarr settings
        if (window.huntarrApp && typeof window.huntarrApp.loadSettings === 'function') {
            window.huntarrApp.loadSettings();
        } else {
            console.error('No loadSettings function found');
        }
        
        // Set up save buttons
        const saveButtons = document.querySelectorAll('#saveSettings, #saveSettingsBottom');
        saveButtons.forEach(button => {
            button.addEventListener('click', function() {
                console.log('Saving Sonarr settings');
                
                if (window.huntarrApp && typeof window.huntarrApp.saveSettings === 'function') {
                    window.huntarrApp.saveSettings();
                }
            });
        });
        
        // Set up reset buttons
        const resetButtons = document.querySelectorAll('#resetSettings, #resetSettingsBottom');
        resetButtons.forEach(button => {
            button.addEventListener('click', function() {
                console.log('Resetting Sonarr settings');
                
                if (window.huntarrApp && typeof window.huntarrApp.resetSettings === 'function') {
                    window.huntarrApp.resetSettings();
                }
            });
        });
    });
</script>

<style>
    .settings-header {
        display: flex;
        align-items: center;
    }
    
    .settings-header h2 {
        margin: 0;
        color: var(--accent-color);
    }
    
    .bottom-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border-color);
    }
</style>
